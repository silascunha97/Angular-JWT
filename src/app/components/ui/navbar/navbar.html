<!-- Dropdown visível apenas se o usuário estiver autenticado -->
<div class="container mx-auto p-4 flex justify-end">
<div class="relative" *ngIf="isLoggedIn; else notLogged">
  <button (click)="toggleDropdown()" class="flex items-center space-x-2 focus:outline-none">
    <img src="https://i.pravatar.cc/32" class="w-8 h-8 rounded-full">
    <span>{{ userName }}</span>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
      viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
      d="M19 9l-7 7-7-7" /></svg>
  </button>

  <div *ngIf="dropdownOpen"
       class="absolute right-0 mt-2 w-40 bg-white text-gray-800 rounded-lg shadow-lg">
    <a href="#" class="block px-4 py-2 hover:bg-gray-100">Perfil</a>
    <a href="#" class="block px-4 py-2 hover:bg-gray-100">Configurações</a>
    <hr class="my-1 border-gray-200">
    <button (click)="logout()" class="w-full text-left px-4 py-2 hover:bg-gray-100">Sair</button>
  </div>
</div>

<ng-template #notLogged>
  <button (click)="login()" class="bg-white text-gray-900 px-4 py-2 rounded-lg hover:bg-gray-200">
    Entrar
  </button>
</ng-template>
</div>
