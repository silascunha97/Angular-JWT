<!-- Formulário de REGISTRO -->
<div *ngIf="isRegisterMode; else loginTpl" class="flex flex-col justify-between min-h-screen bg-gray-100">
  <div class="flex-grow flex items-center justify-center">
    <div class="w-80 p-4 bg-white border border-gray-400 rounded-lg shadow-md">
      <h2 class="text-2xl font-semibold mb-4 text-center">Registrar Conta</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-3">
        <input
          type="text"
          formControlName="name"
          placeholder="Nome completo"
          class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />

        <input
          type="email"
          formControlName="email"
          placeholder="Email@teste.com"
          class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />

        <input
          type="password"
          formControlName="password"
          placeholder="Senha"
          class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />

        <!-- opcional: confirmar senha -->
        <input
          type="password"
          placeholder="Confirmar senha"
          class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />

        <div class="flex justify-between pt-3">
          <button
            type="button"
            (click)="toggleMode()"
            class="text-sm px-3 py-1 border border-gray-400 text-gray-600 rounded hover:bg-gray-100"
          >
            Voltar
          </button>

          <button
            type="submit"
            class="text-sm px-3 py-1 border border-blue-500 text-blue-600 rounded hover:bg-blue-100"
          >
            Registrar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Formulário de LOGIN -->
<ng-template #loginTpl>
  <div class="flex flex-col justify-between min-h-screen bg-gray-100">
    <div class="flex-grow flex items-center justify-center">
      <div class="w-80 p-4 bg-white border border-gray-400 rounded-lg shadow-md">
        <h2 class="text-2xl font-semibold mb-4 text-center">Login</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-3">
          <input
            type="email"
            formControlName="email"
            placeholder="Email@teste.com"
            class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
          />

          <input
            type="password"
            formControlName="password"
            placeholder="Senha"
            class="border border-gray-400 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
          />

          <div class="flex justify-end space-x-2 pt-2">
            <button
              type="button"
              (click)="toggleMode()"
              class="text-sm px-3 py-1 border border-red-500 text-red-600 rounded hover:bg-red-100"
            >
              Registrar
            </button>

            <button
              type="submit"
              class="text-sm px-3 py-1 border border-blue-500 text-blue-600 rounded hover:bg-blue-100"
            >
              Login
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ng-template>
